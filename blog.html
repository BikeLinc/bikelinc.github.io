<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog - Lincoln Scheer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --ink: #1d2433;
      --muted: #5b667a;
      --accent: #0f4c81;
      --accent-2: #1f6fb2;
      --border: #e2e6ef;
    }
    body { background: radial-gradient(1200px 800px at 10% -10%, #eaf1fb 0, #f7f8fb 55%); color: var(--ink); font-family: "IBM Plex Sans", "Source Sans 3", "Noto Sans", "Segoe UI", system-ui, sans-serif; min-height:100vh; line-height:1.6 }
    a{ color: var(--accent); text-decoration:none }
    a:hover{ color: var(--accent-2); text-decoration:underline }
    .container{ max-width:900px }
    .blog-header{ text-align:center; padding:2.5rem 0 }
    .blog-post{ background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.5rem; margin-bottom:1.5rem; box-shadow:0 10px 24px rgba(16,24,40,0.06) }
    .blog-post h2 a{ color: var(--ink); text-decoration:none }
    .blog-meta{ color: var(--muted) }
    .navbar{ background: var(--surface) !important; border-bottom:1px solid var(--border) }
    .navbar-brand, .nav-link{ color: var(--ink) !important }
    .nav-link:hover{ color: var(--accent) !important }
    .nav-link.active{ color: var(--accent) !important; font-weight:600 }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
      <a class="navbar-brand" href="index.html">Lincoln Scheer</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="blog.html">Blog</a></li>
          <li class="nav-item"><a class="nav-link" href="resume.pdf" target="_blank">Resume</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <header class="blog-header">
      <h1>Blog</h1>
      <p>Thoughts, tutorials, and updates</p>
    </header>

    <main>
      <article class="blog-post"><h2><a href="posts/more_coming_soon.html">More coming soon!</a></h2><div class="blog-meta">October 14, 2025 • </div><div class="post-preview"><p>More coming soon!</p></div></article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
